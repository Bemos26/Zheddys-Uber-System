<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zheddy's Boda Platform</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        :root {
            --primary: #FCA311; /* Vibrant Yellow/Orange */
            --secondary: #14213D; /* Deep Navy */
            --bg-color: #F8F9FA;
            --text-color: #333333;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .navbar {
            background-color: var(--secondary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .navbar h1 {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
        }

        .btn {
            background-color: var(--primary);
            color: var(--secondary);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(252, 163, 17, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: var(--secondary);
        }

        .content {
            flex: 1;
            display: flex;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .floating-panel {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .floating-panel h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .input-group label {
            font-size: 0.85rem;
            color: #666;
            font-weight: 500;
        }

        .input-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(252, 163, 17, 0.1);
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #e9ecef;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Utility classes */
        .hidden { display: none !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <h1>Zheddy's Boda</h1>
        <div id="auth-section">
            <span id="user-display" class="hidden" style="margin-right: 15px;"></span>
            <button id="login-btn" class="btn btn-outline" onclick="window.location.href='/login/'">Login</button>
            <button id="logout-btn" class="btn btn-outline hidden" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Global Auth state
        const token = localStorage.getItem('access_token');
        const userRole = localStorage.getItem('user_role');
        const username = localStorage.getItem('username');

        if (token) {
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('user-display').classList.remove('hidden');
            document.getElementById('user-display').innerText = `Hi, ${username}`;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login/';
        }
        
        // Base API Utility
        async function apiCall(endpoint, method = 'GET', body = null) {
            const headers = {
                'Content-Type': 'application/json',
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            const options = { method, headers };
            if (body) {
                options.body = JSON.stringify(body);
            }

            const response = await fetch(`/api${endpoint}`, options);
            if (response.status === 401) {
                // Token expired
                logout();
            }
            return response;
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
